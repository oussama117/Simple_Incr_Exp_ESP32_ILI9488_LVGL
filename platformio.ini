[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    lvgl/lvgl@9.2.0
    bodmer/TFT_eSPI@^2.5.43
    ; XPT2046 touch is handled by TFT_eSPI's built-in driver — no extra lib needed

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9488_DRIVER=1

    ; --- SPI Pin Assignments ---
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=4
    -D TOUCH_CS=21

    ; --- SPI Frequencies ---
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=16000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; --- TFT_eSPI Display Geometry ---
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480

    ; --- Colour fix: RGB565 byte-swap for ILI9488 via TFT_eSPI ---
    -D LV_COLOR_DEPTH=16
    -D LV_COLOR_16_SWAP=1

    ; --- LVGL core ---
    -D LV_CONF_SKIP=1
    -D LV_TICK_CUSTOM=1
    -D LV_TICK_CUSTOM_SYS_TIME_EXPR="millis()"

    ; --- DRAM budget: keep LVGL heap small ---
    ; Draw buffers live in firmware BSS; keep them tiny (see main.cpp).
    ; LVGL internal heap: 24 KB is enough for this simple UI.
    -D LV_MEM_SIZE=24576U

    ; --- Fonts ---
    -D LV_FONT_MONTSERRAT_24=1
    -D LV_FONT_MONTSERRAT_14=1
    -D LV_FONT_DEFAULT=&lv_font_montserrat_14

    ; --- Input device poll period (ms) ---
    -D LV_INDEV_DEF_READ_PERIOD=30